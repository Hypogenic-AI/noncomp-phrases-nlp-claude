idea:
  title: Finding non-compositional phrases
  domain: nlp
  hypothesis: 'It is possible to use the Future Lens method to lower bound the set
    of words and phrases that large language models have memorized as non-compositional
    units, since predictability in advance from a hidden state indicates likely memorization
    as a single unit.

    '
  background:
    description: 'I previously noted that I wanted to find all the words and phrases
      LLMs have memorized:

      https://hypogenic.ai/ideahub/idea/cSOuC7g6YSQHQcWgINsJ

      Can we use Future Lens (https://arxiv.org/abs/2311.04897) to at least lower
      bound this, since when something is predictable in advance from a hidden state
      that means it was memorized as a single unit with high likelihood?

      '
    papers:
    - description: '"Future Lens: Anticipating Future Tokens with Transformers." Yiding
        Hao, Ari Holtzman, Peter West, Noah Amsel, Gabriel Ilharco, Noah Smith, Luke
        Zettlemoyer (2023). arXiv:2311.04897.'
  metadata:
    author: Ari Holtzman
    source: IdeaHub
    source_url: https://hypogenic.ai/ideahub/idea/h2s84jdJLvdiluiD18Dd
